<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Granted</title>
  <style>
    body { margin:0; background:#111; color:white; text-align:center; font-family:Arial; padding:50px; }
    h1 { font-size:28px; }
    p { font-size:20px; margin:30px; }
    .timer { font-size:32px; color:#0f0; }
    a { background:#0f0; color:black; padding:15px 30px; border-radius:10px; text-decoration:none; font-size:20px; opacity:0.5; pointer-events:none; }
    a.active { opacity:1; pointer-events:auto; }
  </style>
</head>
<body>

  <script>
    const referrer = document.referrer.toLowerCase();

    if (referrer.includes("gplinks.co") || referrer.includes("gplinks")) {
      // Valid shortener se aaya – cookie set kar do (24 hours)[span_1](start_span)[span_1](end_span)
      const d = new Date();
      d.setTime(d.getTime() + (24 * 60 * 60 * 1000));
      document.cookie = "site_access=true; expires=" + d.toUTCString() + "; path=/";

      // Message + countdown[span_2](start_span)[span_2](end_span)
      document.body.innerHTML = `
        <h1>✅ Access Granted for 24 Hours!</h1>
        <p>Redirecting in <span class="timer" id="timer">15</span> seconds...</p>
        <a id="homeBtn" href="https://maxton87667-tech.github.io/Comics/index.html">Homepage Par Jao</a>
      `;

      // 15 seconds countdown (back button loophole block – time spend ho jayega)[span_3](start_span)[span_3](end_span)
      let timeLeft = 15;
      const timerElement = document.getElementById('timer');
      const homeBtn = document.getElementById('homeBtn');

      const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(countdown);
          homeBtn.textContent = "Homepage Par Jao";
          homeBtn.classList.add('active');
          
          // Nayi repo ka absolute link, taaki purani site par redirect bilkul na ho
          window.location.href = "https://maxton87667-tech.github.io/Comics/index.html";
        }
      }, 1000);

    } else {
      // Invalid (direct ya back button se) – block[span_4](start_span)[span_4](end_span)
      document.body.innerHTML = `
        <div style="font-size:24px;">
          ⚠️ Invalid Access<br><br>
          Sirf GPLinks shortener solve karne ke baad hi access milega.<br><br>
          Wapas shortener link se try karo.
        </div>`;
    }
  </script>

</body>
</html>
