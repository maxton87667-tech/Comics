<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comic PUR</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a001f;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
  background:#111;
  position:sticky;
  top:0;
  z-index:100;
}

.logo img{
  width:55px;
  height:55px;
  border-radius:50%;
}

.heading img{
  height:90px;
}

.search img{
  width:40px;
  cursor:pointer;
}

/* SLIDER */
.slider{
  overflow:hidden;
  width:100%;
}

.slides{
  display:flex;
  transition:0.5s ease;
}

.card{
  min-width:100%;
  position:relative;
}

.card img{
  width:100%;
  height:450px;
  object-fit:cover;
}

.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

.overlay h2{
  margin:0;
  font-size:20px;
}

.overlay p{
  margin:3px 0;
  font-size:13px;
  opacity:0.85;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.grid-item{
  position:relative;
  cursor:pointer;
}

.grid-item img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
}

.grid-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:8px;
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
  font-size:12px;
}

/* LOAD BUTTON */
#loadMoreBtn{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00d4ff,#ff4fd8);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="heading">
    <img src="assets/logo-circle.png">
  </div>

  <div class="search" onclick="location.href='search.html'">
    <img src="assets/search.png">
  </div>
</header>

<!-- SLIDER -->
<div class="slider">
  <div class="slides" id="slides"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<div style="text-align:center;padding:20px;">
  <button id="loadMoreBtn" onclick="loadMore()">Load More</button>
</div>

<script>

let comics=[];
let sliderIndex=0;
let gridIndex=0;
const limit=8;

/* LOAD DATA */
fetch("comics.json")
.then(r=>r.json())
.then(data=>{
  comics=data;

  comics.sort((a,b)=>new Date(b.date)-new Date(a.date));

  loadSlider();
  loadMore();
  autoSlide();
});

/* SLIDER */
function loadSlider(){
  const slides=document.getElementById("slides");

  comics.filter(c=>c.featured).forEach(c=>{
    slides.innerHTML+=`
      <div class="card">
        <img src="${c.cover}">
        <div class="overlay">
          <h2>${c.title}</h2>
          <p>${c.genre} • ${c.episodes} EP</p>
          <p>${c.summary.slice(0,80)}...</p>
        </div>
      </div>
    `;
  });
}

/* AUTO SLIDE */
function autoSlide(){
  const slides=document.getElementById("slides");

  setInterval(()=>{
    sliderIndex++;
    let total=document.querySelectorAll(".card").length;
    if(sliderIndex>=total) sliderIndex=0;
    slides.style.transform=`translateX(-${sliderIndex*100}%)`;
  },3000);
}

/* LOAD MORE GRID */
function loadMore(){
  const grid=document.getElementById("grid");

  let next=comics.slice(gridIndex,gridIndex+limit);

  next.forEach(c=>{
    grid.innerHTML+=`
      <div class="grid-item" onclick="openComic('${c.slug}')">
        <img src="${c.cover}">
        <div class="grid-overlay">${c.title}</div>
      </div>
    `;
  });

  gridIndex+=limit;

  if(gridIndex>=comics.length){
    document.getElementById("loadMoreBtn").style.display="none";
  }
}

/* OPEN COMIC */
function openComic(slug){
  location.href=`comic.html?comic=${slug}`;
}

</script>

</body>
</html>
