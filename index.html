<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comic PUR</title>

<style>
:root{
  --primary:#00d4ff;
  --accent:#ff69b4;
  --dark:#0a001f;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:linear-gradient(135deg,var(--dark),#1a003f);
  color:white;
  font-family:'Segoe UI',sans-serif;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px;
  background:rgba(10,0,31,0.9);
  position:sticky;
  top:0;
}

header img{
  height:45px;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h1{
  font-size:28px;
  color:var(--primary);
}

.hero p{
  opacity:0.7;
  margin-top:8px;
}

/* SEARCH BAR */
.search-bar{
  width:90%;
  margin:20px auto;
  display:block;
  padding:12px;
  border-radius:25px;
  border:2px solid var(--primary);
  background:transparent;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  padding:6px;
}

.card p{
  font-size:12px;
  opacity:0.7;
  padding:0 6px 10px;
}

/* LOAD MORE */
.load{
  text-align:center;
  margin:20px;
}

.load button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <img src="assets/heading.png">
  <img src="assets/search-icon.png" onclick="location.href='search.html'">
</header>

<div class="hero">
  <h1>Comic PUR</h1>
  <p>Read Unlimited Comics Online</p>
</div>

<input class="search-bar" id="search" placeholder="Search comics..." onkeyup="searchComic()">

<div class="grid" id="grid"></div>

<div class="load">
  <button onclick="loadMore()">Load More</button>
</div>

<script>

let comics=[];
let visible=20;

fetch("comics.json")
.then(r=>r.json())
.then(data=>{
  comics=data;
  render();
});

function render(){
  let grid=document.getElementById("grid");
  grid.innerHTML="";

  comics.slice(0,visible).forEach(c=>{
    grid.innerHTML+=`
      <div class="card" onclick="openComic('${c.slug}')">
        <img src="${c.cover}">
        <h3>${c.title}</h3>
        <p>${c.genre || "Comic"}</p>
      </div>
    `;
  });
}

function loadMore(){
  visible+=20;
  render();
}

function openComic(slug){
  location.href=`comic.html?comic=${slug}`;
}

function searchComic(){
  let val=document.getElementById("search").value.toLowerCase();
  let grid=document.getElementById("grid");

  grid.innerHTML="";

  comics
  .filter(c=>c.title.toLowerCase().includes(val))
  .forEach(c=>{
    grid.innerHTML+=`
      <div class="card" onclick="openComic('${c.slug}')">
        <img src="${c.cover}">
        <h3>${c.title}</h3>
        <p>${c.genre || ""}</p>
      </div>
    `;
  });
}

</script>

</body>
</html>
