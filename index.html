<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic PUR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:linear-gradient(180deg,#070018,#12003a);
color:white;
font-family:'Poppins',sans-serif;
}

/* HEADER */

header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
background:rgba(10,0,31,0.9);
backdrop-filter:blur(10px);
}

header img{
height:44px;
}

/* SLIDER */

.slider{
margin:14px;
overflow:hidden;
border-radius:20px;
position:relative;
}

.slider-track{
display:flex;
transition:0.4s ease;
}

.slide{
min-width:100%;
position:relative;
}

.slide img{
width:100%;
height:240px;
object-fit:cover;
}

.slide-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(90deg,rgba(0,0,0,0.85),transparent);
}

.slide-text{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
max-width:60%;
}

.slide-title{
font-size:30px;
font-weight:800;
}

.slide-info{
font-size:13px;
margin-top:6px;
opacity:.85;
}

/* BADGE */

.badge{
position:absolute;
top:10px;
right:10px;
padding:4px 8px;
font-size:11px;
font-weight:600;
border-radius:6px;
}

.pg{background:#00c853;}
.ad{background:#ff1744;}

/* DOTS */

.dots{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
background:#888;
border-radius:50%;
}

.dot.active{
background:#00d4ff;
}

/* GRID */

.section{
padding:0 14px;
font-size:14px;
margin-top:6px;
opacity:.8;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:14px;
}

.card{
border-radius:16px;
overflow:hidden;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(8px);
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
}

.card-info{
padding:10px;
}

.card-title{
font-size:14px;
font-weight:600;
}

.card-ep{
font-size:12px;
opacity:.7;
margin-top:2px;
}

a{
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<header>
<img src="assets/heading.png">
<img src="assets/logo-circle.png">
<img src="assets/search-icon.png" onclick="location.href='search.html'">
</header>

<!-- SLIDER -->
<div class="slider">
<div class="slider-track" id="slider"></div>
<div class="dots" id="dots"></div>
</div>

<!-- GRID -->
<div class="section">Latest Comics</div>
<div class="grid" id="grid"></div>

<script>

let comics=[], details=[], sliderData=[];

Promise.all([
fetch("data/comics.json").then(r=>r.json()),
fetch("data/details.json").then(r=>r.json()),
fetch("data/slider.json").then(r=>r.json())
])
.then(([c,d,s])=>{
comics=c.comics;
details=d.details;
sliderData=s.slider;
render();
});

function render(){

/* SLIDER */

const slider=document.getElementById("slider");
const dots=document.getElementById("dots");

slider.innerHTML="";
dots.innerHTML="";

let activeSlides = sliderData
.filter(s=>s.active)
.sort((a,b)=>a.order-b.order);

activeSlides.forEach((s,i)=>{

let comic = comics.find(c=>c.slug===s.slug);
let det = details.find(d=>d.slug===s.slug);

if(!comic) return;

slider.innerHTML+=`
<a href="comic.html?comic=${comic.slug}">
<div class="slide">

<span class="badge ${comic.badge==="AD-18"?"ad":"pg"}">
${comic.badge}
</span>

<img src="${s.image}">

<div class="slide-overlay"></div>

<div class="slide-text">
<div class="slide-title">${comic.title}</div>
<div class="slide-info">
${det ? det.total+" Episodes" : ""}
</div>
</div>

</div>
</a>
`;

dots.innerHTML+=`<div class="dot ${i==0?"active":""}"></div>`;

});

/* SWIPE */

let index=0;
let startX=0;
let track=document.getElementById("slider");
let dot=document.querySelectorAll(".dot");

track.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

track.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX-endX>50) index++;
if(endX-startX>50) index--;

if(index<0) index=0;
if(index>=activeSlides.length) index=activeSlides.length-1;

track.style.transform=`translateX(-${index*100}%)`;

dot.forEach(d=>d.classList.remove("active"));
if(dot[index]) dot[index].classList.add("active");
});

/* AUTO SLIDE */

setInterval(()=>{
index++;
if(index>=activeSlides.length) index=0;

track.style.transform=`translateX(-${index*100}%)`;

dot.forEach(d=>d.classList.remove("active"));
if(dot[index]) dot[index].classList.add("active");

},4000);

/* GRID */

const grid=document.getElementById("grid");
grid.innerHTML="";

comics.forEach(c=>{

let det = details.find(d=>d.slug===c.slug);

grid.innerHTML+=`
<a href="comic.html?comic=${c.slug}">
<div class="card">

<span class="badge ${c.badge==="AD-18"?"ad":"pg"}">
${c.badge}
</span>

<img src="${c.cover}">

<div class="card-info">
<div class="card-title">${c.title}</div>
<div class="card-ep">
${det ? det.total+" Episodes" : ""}
</div>
</div>

</div>
</a>
`;

});

}

</script>

</body>
</html>
