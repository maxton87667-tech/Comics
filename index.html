<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comic Pur</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    .navbar{
      display:flex;
      justify-content:space-between;
      padding:15px 20px;
      background:#111;
      position:sticky;
      top:0;
    }

    .logo{
      color:#00ff66;
      font-size:22px;
      font-weight:bold;
    }

    .hero{
      text-align:center;
      padding:50px 20px;
      background:linear-gradient(135deg,#111,#1a1a1a);
    }

    .btn{
      padding:10px 20px;
      background:#00ff66;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .section{
      padding:20px;
    }

    .section h2{
      color:#00ff66;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:15px;
    }

    .card{
      background:#1a1a1a;
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .info{
      padding:10px;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="navbar">
    <div class="logo">📚 Comic Pur</div>
    <div>
      <a href="index.html" style="color:white;margin-right:10px;">Home</a>
      <a href="comics.html" style="color:white;">Comics</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Welcome to Comic Pur</h1>
    <p>Read Comics Online</p>
    <button class="btn" onclick="location.href='comics.html'">
      Start Reading
    </button>
  </div>

  <!-- TRENDING -->
  <div class="section">
    <h2>🔥 Trending Comics</h2>
    <div class="grid" id="trendingGrid"></div>
  </div>

  <!-- FEATURED -->
  <div class="section">
    <h2>⭐ Featured Comics</h2>
    <div class="grid" id="featuredGrid"></div>
  </div>

  <!-- JS CONNECT -->
  <script src="js/main.js"></script>

</body>
</html>
