<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comic PUR</title>

<style>
:root{
  --primary:#00d4ff;
  --dark:#0a001f;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:linear-gradient(135deg,var(--dark),#1a003f);
  color:white;
  font-family:sans-serif;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  background:rgba(0,0,0,0.4);
  position:sticky;
  top:0;
  z-index:10;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid var(--primary);
}

.heading img{
  height:40px;
}

.search-icon img{
  width:38px;
  height:38px;
  cursor:pointer;
}

/* SLIDER */
.slider{
  width:100%;
  overflow:hidden;
  position:relative;
}

.slides{
  display:flex;
  transition:transform 0.5s ease-in-out;
}

.slide{
  min-width:100%;
  position:relative;
}

.slide img{
  width:100%;
  height:400px;
  object-fit:cover;
}

/* AGE BADGE */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:5px 10px;
  font-size:12px;
  border-radius:8px;
}

/* SLIDER INFO */
.info{
  position:absolute;
  bottom:0;
  width:100%;
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
  padding:15px;
}

.info h2{font-size:18px;}
.info p{font-size:12px;opacity:0.8;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  padding:5px;
}

.card p{
  font-size:12px;
  opacity:0.7;
  padding:0 5px 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="assets/logo.png" alt="logo">
  </div>

  <div class="heading">
    <img src="assets/logo-circle.png" alt="Comic PUR">
  </div>

  <div class="search-icon" onclick="location.href='search.html'">
    <img src="assets/search.png" alt="search">
  </div>
</header>

<!-- SLIDER -->
<div class="slider">
  <div class="slides" id="slides"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script>

let comics=[];
let index=0;

fetch("comics.json")
.then(r=>r.json())
.then(data=>{
  comics=data;
  renderSlider();
  renderGrid();
  autoSlide();
});

/* SLIDER */
function renderSlider(){
  const slides=document.getElementById("slides");

  comics.slice(0,5).forEach(c=>{
    slides.innerHTML+=`
      <div class="slide">
        <img src="${c.cover}">

        <div class="badge">${c.rating}</div>

        <div class="info">
          <h2>${c.title}</h2>
          <p>${c.genre} • ${c.episodes} Episodes</p>
          <p>${c.summary.substring(0,120)}...</p>
        </div>
      </div>
    `;
  });
}

/* AUTO SLIDE */
function autoSlide(){
  const slides=document.getElementById("slides");

  setInterval(()=>{
    index++;
    if(index>=Math.min(comics.length,5)) index=0;

    slides.style.transform=`translateX(-${index*100}%)`;
  },3000);
}

/* GRID */
function renderGrid(){
  const grid=document.getElementById("grid");

  comics.slice(0,12).forEach(c=>{
    grid.innerHTML+=`
      <div class="card" onclick="openComic('${c.slug}')">
        <img src="${c.cover}">
        <h3>${c.title}</h3>
        <p>${c.genre}</p>
      </div>
    `;
  });
}

function openComic(slug){
  location.href=`comic.html?comic=${slug}`;
}

</script>

</body>
</html>
