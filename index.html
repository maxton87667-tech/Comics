<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comic Pur</title>

<style>
:root {
  --primary: #00d4ff;
  --accent: #ff69b4;
  --dark: #0a001f;
  --glow: rgba(0, 212, 255, 0.7);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(135deg, var(--dark), #1a003f);
  color: white;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* HEADER */
header {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10, 0, 31, 0.92);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(0, 212, 255, 0.35);
  height: 64px;
}

.logo img {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  box-shadow: 0 0 20px var(--glow);
}

.heading-img {
  max-width: 220px;
}

.search-icon {
  width: 60px;
  cursor: pointer;
  filter: drop-shadow(0 0 15px var(--glow));
}

/* GRID */
.container {
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
}

/* CARD */
.card {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
}

.title {
  font-size: 14px;
  font-weight: bold;
}

.meta {
  font-size: 11px;
  color: #ccc;
}

/* BUTTON */
.load-btn {
  display: block;
  margin: 25px auto;
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, var(--primary), var(--accent));
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px var(--glow);
}

.load-btn:hover {
  transform: translateY(-3px);
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/heading.png">
  </div>

  <img src="assets/logo-circle.png" class="heading-img">

  <img src="assets/search-icon.png" class="search-icon"
       onclick="window.location.href='search.html'">
</header>

<div class="container">
  <div class="grid" id="comicList"></div>
  <button id="loadMore" class="load-btn">Load More</button>
</div>

<script>
let comics = [];
let visible = 8;

fetch("comics.json")
.then(res => res.json())
.then(data => {

  comics = data.comics
    .filter(c => c.show)
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  render();
});

function render() {
  const list = document.getElementById("comicList");
  list.innerHTML = "";

  comics.slice(0, visible).forEach(c => {
    list.innerHTML += `
      <div class="card" onclick="openComic('${c.link}')">
        <img src="${c.cover}">
        <div class="overlay">
          <div class="title">${c.title}</div>
          <div class="meta">Episodes: ${c.episodes}</div>
          <div class="meta">${c.genre}</div>
        </div>
      </div>
    `;
  });

  if (visible >= comics.length) {
    document.getElementById("loadMore").style.display = "none";
  }
}

function openComic(link) {
  window.location.href = link;
}

document.getElementById("loadMore").addEventListener("click", () => {
  visible += 8;
  render();
});
</script>

</body>
</html>
