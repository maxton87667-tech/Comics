<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comic Pur</title>

  <style>
    :root {
      --primary: #00d4ff;
      --accent: #ff69b4;
      --dark: #0a001f;
      --glow: rgba(0, 212, 255, 0.7);
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      background: linear-gradient(135deg, var(--dark), #1a003f);
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 0, 31, 0.92);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(0, 212, 255, 0.35);
      height: 64px;
    }

    .logo img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      box-shadow: 0 0 20px var(--glow);
      object-fit: cover;
    }

    .heading-img {
      max-width: 220px;
    }

    .search-icon {
      width: 60px;
      cursor: pointer;
      filter: drop-shadow(0 0 15px var(--glow));
      transition: transform 0.2s;
    }

    .search-icon:hover {
      transform: scale(1.1);
    }

    /* GRID */
    .container {
      padding: 15px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    /* CARD */
    .card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
      background: #000;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 15px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.6), transparent);
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .meta {
      font-size: 11px;
      color: #ccc;
      margin-top: 2px;
    }

    /* BUTTON */
    .load-btn {
      display: none;
      margin: 30px auto;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px var(--glow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .load-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 20px var(--glow);
    }

    /* ERROR MESSAGE */
    .error-msg {
      text-align: center;
      color: #ff6b6b;
      margin-top: 50px;
      font-weight: bold;
      display: none;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <img src="assets/heading.png" alt="Logo">
    </div>

    <img src="assets/logo-circle.png" class="heading-img" alt="Comic Pur">

    <img src="assets/search-icon.png" class="search-icon" alt="Search"
         onclick="window.location.href='search.html'">
  </header>

  <div class="container">
    <div id="errorMessage" class="error-msg">Failed to load comics. Please try again later.</div>
    <div class="grid" id="comicList"></div>
    <button id="loadMore" class="load-btn">Load More</button>
  </div>

  <script>
    let comics = [];
    let visible = 8;
    const list = document.getElementById("comicList");
    const loadMoreBtn = document.getElementById("loadMore");
    const errorMsg = document.getElementById("errorMessage");

    // Fetch and parse the JSON data
    fetch("comics.json")
      .then(res => {
        if (!res.ok) throw new Error("Network response was not ok");
        return res.json();
      })
      .then(data => {
        // Filter, sort by date (newest first)
        comics = data.comics
          .filter(c => c.show)
          .sort((a, b) => new Date(b.date) - new Date(a.date));
        
        render();
      })
      .catch(error => {
        console.error("Error loading JSON:", error);
        errorMsg.style.display = "block";
      });

    // Render the comic cards to the grid
    function render() {
      list.innerHTML = ""; 

      comics.slice(0, visible).forEach(c => {
        list.innerHTML += `
          <div class="card" onclick="openComic('${c.link}')">
            <img src="${c.cover}" alt="${c.title}" loading="lazy">
            <div class="overlay">
              <div class="title">${c.title}</div>
              <div class="meta">Episodes: ${c.episodes}</div>
              <div class="meta">${c.genre}</div>
            </div>
          </div>
        `;
      });

      // Show or hide the Load More button based on remaining items
      if (visible < comics.length) {
        loadMoreBtn.style.display = "block";
      } else {
        loadMoreBtn.style.display = "none";
      }
    }

    // Navigation function
    function openComic(link) {
      window.location.href = link;
    }

    // Load More event listener
    loadMoreBtn.addEventListener("click", () => {
      visible += 8;
      render();
    });
  </script>

</body>
</html>
