<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comic Hub</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    /* NAVBAR */
    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      background:#111;
      position:sticky;
      top:0;
    }

    .navbar h1{
      font-size:20px;
      color:#0f0;
    }

    .search input{
      padding:8px;
      border-radius:8px;
      border:none;
      outline:none;
    }

    /* HERO */
    .hero{
      padding:40px;
      text-align:center;
      background:linear-gradient(to right,#111,#222);
    }

    .hero h2{
      font-size:32px;
      margin-bottom:10px;
    }

    .btn{
      padding:10px 20px;
      background:#0f0;
      color:black;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    /* SECTION */
    .section{
      padding:20px;
    }

    .section h3{
      margin-bottom:15px;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:15px;
    }

    .card{
      background:#1a1a1a;
      border-radius:16px;
      overflow:hidden;
      transition:0.3s;
      cursor:pointer;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .info{
      padding:10px;
    }

    .badge{
      position:absolute;
      background:red;
      padding:5px 8px;
      font-size:10px;
      border-radius:5px;
      top:10px;
      right:10px;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <h1>📚 Comic Hub</h1>

    <div class="search">
      <input type="text" placeholder="Search comics...">
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h2>Welcome to Comic World</h2>
    <p>Read Action • Horror • Fantasy Comics Online</p>
    <button class="btn">Explore Now</button>
  </div>

  <!-- TRENDING -->
  <div class="section">
    <h3>🔥 Trending Comics</h3>

    <div class="grid">

      <div class="card">
        <img src="assets/images/sample1.jpg">
        <div class="info">
          <b>Shadow Fighter</b><br>
          Action | 24 CH
        </div>
      </div>

      <div class="card">
        <img src="assets/images/sample2.jpg">
        <div class="info">
          <b>Dark Hero</b><br>
          Horror | 12 CH
        </div>
      </div>

    </div>
  </div>

  <!-- FEATURED -->
  <div class="section">
    <h3>⭐ Featured Comics</h3>

    <div class="grid">

      <div class="card">
        <img src="assets/images/sample3.jpg">
        <div class="info">
          <b>Blade King</b><br>
          Fantasy | 30 CH
        </div>
      </div>

    </div>
  </div>

</body>
</html>
