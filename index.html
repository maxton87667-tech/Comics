<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comic PUR</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a001f;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
  position:sticky;
  top:0;
  z-index:10;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid #00d4ff;
}

.heading img{
  height:40px;
}

.search img{
  width:35px;
  cursor:pointer;
}

/* SLIDER */
.slider{
  overflow:hidden;
  width:100%;
}

.slides{
  display:flex;
  transition:0.5s ease;
}

.slide{
  min-width:100%;
  position:relative;
}

.slide img{
  width:100%;
  height:400px;
  object-fit:cover;
}

.info{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
}

.info h2{
  margin:0;
  font-size:18px;
}

.info p{
  font-size:13px;
  opacity:0.8;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

.card p{
  font-size:14px;
  text-align:center;
  margin:5px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="heading">
    <img src="assets/logo-circle.png">
  </div>

  <div class="search" onclick="location.href='search.html'">
    <img src="assets/search.png">
  </div>
</header>

<!-- SLIDER -->
<div class="slider">
  <div class="slides" id="slides"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script>

let comics=[];
let index=0;

fetch("comics.json")
.then(r=>r.json())
.then(data=>{
  comics=data;

  // latest first
  comics.sort((a,b)=>new Date(b.date)-new Date(a.date));

  loadSlider();
  loadGrid();
  autoSlide();
});

/* SLIDER (FEATURED ONLY) */
function loadSlider(){
  const slides=document.getElementById("slides");

  let featured = comics.filter(c=>c.featured);

  featured.forEach(c=>{
    slides.innerHTML+=`
      <div class="slide" onclick="openComic('${c.slug}')">
        <img src="${c.cover}">
        <div class="info">
          <h2>${c.title}</h2>
          <p>${c.genre} • ${c.episodes} Episodes</p>
        </div>
      </div>
    `;
  });
}

/* AUTO SLIDE */
function autoSlide(){
  const slides=document.getElementById("slides");

  setInterval(()=>{
    index++;
    let total = document.querySelectorAll(".slide").length;

    if(index>=total) index=0;

    slides.style.transform=`translateX(-${index*100}%)`;
  },3000);
}

/* GRID */
function loadGrid(){
  const grid=document.getElementById("grid");

  comics.forEach(c=>{
    grid.innerHTML+=`
      <div class="card" onclick="openComic('${c.slug}')">
        <img src="${c.cover}">
        <p>${c.title}</p>
      </div>
    `;
  });
}

function openComic(slug){
  location.href=`comic.html?comic=${slug}`;
}

</script>

</body>
</html>
