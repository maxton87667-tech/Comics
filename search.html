<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search - Comic PUR</title>

<style>
:root{
  --primary:#00d4ff;
  --dark:#0a001f;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:linear-gradient(135deg,var(--dark),#1a003f);
  color:white;
  font-family:sans-serif;
}

/* HEADER (SAME AS INDEX) */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  background:rgba(0,0,0,0.4);
  position:sticky;
  top:0;
  z-index:10;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid var(--primary);
}

.heading img{
  height:40px;
}

.search-icon img{
  width:38px;
  height:38px;
  cursor:pointer;
}

/* SEARCH INPUT */
.search-box{
  width:90%;
  margin:20px auto;
  display:block;
  padding:12px;
  border-radius:25px;
  border:2px solid var(--primary);
  background:transparent;
  color:white;
  outline:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  padding:5px;
}

.card p{
  font-size:12px;
  opacity:0.7;
  padding:0 5px 10px;
}

/* NO RESULT */
.no{
  text-align:center;
  margin-top:50px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- HEADER (SAME) -->
<header>
  <div class="logo">
    <img src="assets/logo.png" alt="logo">
  </div>

  <div class="heading">
    <img src="assets/logo-circle.png" alt="Comic PUR">
  </div>

  <div class="search-icon" onclick="location.href='search.html'">
    <img src="assets/search.png" alt="search">
  </div>
</header>

<!-- SEARCH BOX -->
<input class="search-box" id="search" placeholder="Search comics..." onkeyup="searchComic()">

<!-- RESULTS -->
<div class="grid" id="grid"></div>
<p class="no" id="no"></p>

<script>

let comics=[];

fetch("comics.json")
.then(r=>r.json())
.then(data=>{
  comics=data;
  render(comics);
});

function render(list){
  const grid=document.getElementById("grid");
  const no=document.getElementById("no");

  grid.innerHTML="";

  if(list.length===0){
    no.innerText="No comics found 😔";
    return;
  }else{
    no.innerText="";
  }

  list.forEach(c=>{
    grid.innerHTML+=`
      <div class="card" onclick="openComic('${c.slug}')">
        <img src="${c.cover}">
        <h3>${c.title}</h3>
        <p>${c.genre || ""}</p>
      </div>
    `;
  });
}

function searchComic(){
  let val=document.getElementById("search").value.toLowerCase();

  let filtered=comics.filter(c=>
    c.title.toLowerCase().includes(val) ||
    (c.genre && c.genre.toLowerCase().includes(val))
  );

  render(filtered);
}

function openComic(slug){
  location.href=`comic.html?comic=${slug}`;
}

</script>

</body>
</html>
