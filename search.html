<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search - Comic PUR</title>

<style>
:root{
  --primary:#00d4ff;
  --dark:#0a001f;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:linear-gradient(135deg,var(--dark),#1a003f);
  color:white;
  font-family:'Segoe UI',sans-serif;
}

/* HEADER */
header{
  padding:12px;
  text-align:center;
  font-size:20px;
  color:var(--primary);
  font-weight:bold;
}

/* SEARCH BOX */
.search-box{
  width:90%;
  margin:20px auto;
  display:block;
  padding:12px;
  border-radius:25px;
  border:2px solid var(--primary);
  background:transparent;
  color:white;
  outline:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  padding:6px;
}

.card p{
  font-size:12px;
  opacity:0.7;
  padding:0 6px 10px;
}

/* NO RESULT */
.no{
  text-align:center;
  margin-top:50px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>🔍 Search Comics</header>

<input class="search-box" id="search" placeholder="Type comic name..." onkeyup="searchComic()">

<div class="grid" id="grid"></div>

<p class="no" id="no"></p>

<script>

let comics=[];

fetch("comics.json")
.then(r=>r.json())
.then(data=>{
  comics=data;
  render(comics);
});

function render(list){
  const grid=document.getElementById("grid");
  const no=document.getElementById("no");

  grid.innerHTML="";

  if(list.length===0){
    no.innerText="No comics found 😔";
    return;
  }else{
    no.innerText="";
  }

  list.forEach(c=>{
    grid.innerHTML+=`
      <div class="card" onclick="openComic('${c.slug}')">
        <img src="${c.cover}">
        <h3>${c.title}</h3>
        <p>${c.genre || ""}</p>
      </div>
    `;
  });
}

function searchComic(){
  let val=document.getElementById("search").value.toLowerCase();

  let filtered=comics.filter(c=>
    c.title.toLowerCase().includes(val) ||
    (c.genre && c.genre.toLowerCase().includes(val))
  );

  render(filtered);
}

function openComic(slug){
  location.href=`comic.html?comic=${slug}`;
}

</script>

</body>
</html>
