<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Comic Raw Link Generator</title>

<style>
    body{
        font-family:Arial,sans-serif;
        max-width:800px;
        margin:20px auto;
        padding:20px;
    }

    h2{
        text-align:center;
    }

    select,button{
        width:100%;
        padding:12px;
        margin:10px 0;
        font-size:16px;
    }

    textarea{
        width:100%;
        height:300px;
        padding:10px;
        font-size:14px;
    }

    .status{
        margin:10px 0;
    }
</style>
</head>

<body>

<h2>Comic Raw Link Generator</h2>

<label>Select Comic</label>
<select id="comicSelect">
    <option>Loading comics...</option>
</select>

<label>Select Chapter</label>
<select id="chapterSelect">
    <option>Select comic first</option>
</select>

<button onclick="generateLinks()">Get Raw Links</button>

<button onclick="copyLinks()">Copy All Links</button>

<div class="status" id="status"></div>

<textarea id="output" readonly></textarea>

<script>
const owner = "maxton480";
const repo = "Comics";
const branch = "main";

const comicSelect = document.getElementById("comicSelect");
const chapterSelect = document.getElementById("chapterSelect");
const output = document.getElementById("output");
const statusDiv = document.getElementById("status");

loadComics();

async function loadComics() {
    statusDiv.innerText = "Loading comics...";

    try{
        const url =
        `https://api.github.com/repos/${owner}/${repo}/contents/comics`;

        const res = await fetch(url);
        const data = await res.json();

        comicSelect.innerHTML = "";

        data
        .filter(item => item.type === "dir")
        .sort((a,b)=>a.name.localeCompare(b.name))
        .forEach(item=>{
            comicSelect.innerHTML +=
            `<option value="${item.name}">${item.name}</option>`;
        });

        statusDiv.innerText = "";

        loadChapters();

    }catch(err){
        statusDiv.innerText = "Failed to load comics.";
    }
}

comicSelect.addEventListener("change", loadChapters);

async function loadChapters(){

    const comic = comicSelect.value;

    chapterSelect.innerHTML =
    "<option>Loading chapters...</option>";

    try{

        const url =
        `https://api.github.com/repos/${owner}/${repo}/contents/comics/${comic}`;

        const res = await fetch(url);
        const data = await res.json();

        chapterSelect.innerHTML = "";

        data
        .filter(item => item.type === "dir")
        .sort((a,b)=>
            a.name.localeCompare(
                b.name,
                undefined,
                {numeric:true}
            )
        )
        .forEach(item=>{
            chapterSelect.innerHTML +=
            `<option value="${item.name}">${item.name}</option>`;
        });

    }catch(err){
        chapterSelect.innerHTML =
        "<option>Failed to load</option>";
    }
}

async function generateLinks(){

    const comic = comicSelect.value;
    const chapter = chapterSelect.value;

    output.value = "";
    statusDiv.innerText = "Generating links...";

    try{

        const url =
        `https://api.github.com/repos/${owner}/${repo}/contents/comics/${comic}/${chapter}`;

        const res = await fetch(url);
        const data = await res.json();

        const files = data
        .filter(item =>
            item.type === "file" &&
            item.name.match(/\.(webp|jpg|jpeg|png)$/i)
        )
        .sort((a,b)=>
            a.name.localeCompare(
                b.name,
                undefined,
                {numeric:true}
            )
        );

        const links = files.map(file => file.download_url);

        output.value = links.join("\n");

        statusDiv.innerText =
        `${links.length} images found.`;

    }catch(err){
        statusDiv.innerText =
        "Failed to generate links.";
    }
}

function copyLinks(){

    if(!output.value){
        alert("No links found.");
        return;
    }

    navigator.clipboard.writeText(output.value);

    alert("Links copied!");
}
</script>

</body>
</html>
