<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pyaar Ka Intezar- Comic PUR</title>
  <style>
    :root {
      --primary: #00d4ff;
      --accent: #ff69b4;
      --dark: #0a001f;
      --glow: rgba(0, 212, 255, 0.7);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(135deg, var(--dark), #1a003f);
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 0, 31, 0.92);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(0, 212, 255, 0.35);
      height: 64px;
    }

    .logo img { width: 52px; height: 52px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 20px var(--glow); object-fit: cover; }
    .heading-img { max-width: 220px; height: auto; display: block; margin: 0 auto; }
    .search-icon { width: 68px; height: 68px; cursor: pointer; animation: float 4.8s ease-in-out infinite; transition: all 0.4s; filter: drop-shadow(0 0 15px var(--glow)); }
    .search-icon:hover { transform: scale(1.15); filter: drop-shadow(0 0 25px var(--primary)); animation-play-state: paused; }

    main { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

    .cover {
      width: 100%;
      max-width: 380px;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 212, 255, 0.25);
      margin: 30px auto 40px;
      display: block;
    }

    .summary {
      background: rgba(34, 34, 60, 0.7);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 40px;
      font-size: 1.1rem;
      line-height: 1.7;
      border: 1px solid rgba(0, 212, 255, 0.2);
      backdrop-filter: blur(8px);
    }

    /* New Episode Finder */
    .episode-finder {
      margin-bottom: 40px;
    }

    .search-bar {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.1rem;
      background: rgba(34, 34, 60, 0.8);
      border: 2px solid rgba(0, 212, 255, 0.4);
      border-radius: 50px;
      color: white;
      outline: none;
      margin-bottom: 20px;
    }

    .pagination {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .page-btn {
      padding: 8px 16px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 8px;
      color: var(--primary);
      cursor: pointer;
      transition: all 0.3s;
    }

    .page-btn.active, .page-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .episodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .btn {
      background: linear-gradient(45deg, var(--primary), var(--accent));
      color: white;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
    }

    .back {
      text-align: center;
      margin: 50px 0;
    }

    .back a {
      color: #aaa;
      text-decoration: none;
      font-size: 1.1rem;
    }

    .back a:hover { color: var(--primary); }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @media (max-width: 768px) {
      .episodes-grid { grid-template-columns: repeat(2, 1fr); }
      .heading-img { max-width: 180px; }
      .search-icon { width: 58px; height: 58px; }
      .logo img { width: 48px; height: 48px; }
    }
  </style>
</head>
<body>

  <script>
  function getCookie(name) {
    let matches = document.cookie.match(new RegExp(
      "(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"
    ));
    return matches ? decodeURIComponent(matches[1]) : "";
  }

  if (getCookie("site_access") !== "true") {
    document.documentElement.innerHTML = `
      <head><title>Access Blocked</title></head>
      <body style="margin:0; background:#111; color:white; font-family:Arial; text-align:center; padding:50px;">
        <div style="font-size:24px; background:#900; padding:30px; border-radius:15px; max-width:90%; margin:auto;">
          ⚠️ Direct Access Blocked<br><br>
          Shortener solve karke hi site open hogi.<br><br>
          <a href="https://gplinks.co/BFmfakvr" style="color:#fff; background:#f00; padding:15px; border-radius:10px; text-decoration:none;">Unlock Site</a>
        </div>
      </body>`;
    throw new Error("Access blocked");
  }
  </script>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="../assets/heading.png" alt="Comic PUR Logo" class="logo-img">
    </div>
    <div class="heading-container">
      <img src="../assets/logo-circle.png" alt="Comic PUR" class="heading-img">
    </div>
    <div class="search-btn">
      <img src="../assets/search-icon.png" class="search-icon" alt="Search" onclick="window.location.href='../search.html'">
    </div>
  </header>

  <main>
    <img src="https://i.ibb.co/FkjT6brt/file-000000008f98720bb90daea18f2149bd.png" alt="Pyaar Ka Intezar" class="cover" loading="lazy">

    <div class="summary">
      <p>ये कहानी है छवि की जो बचपन से ही बदकिस्मत थी। पापा के होते हुए भी उसे अपने चाचा चाची के साथ रहना पडा। और पापा के गज़र जाने के बाद उसे बेच दिया गया। ऐसे में वो मिलती है अपने सौदे बाज़ी के पति से जिसने कई राज छिपाये हैं अपने मुखौटे के पीछे।</div>

    <!-- New Episode Finder -->
    <div class="episode-finder">
      <h2 style="text-align:center; margin-bottom:20px; color:var(--primary);">Episode Finder</h2>
      
      <input type="text" id="episodeSearch" class="search-bar" placeholder="Episode number search karo" onkeyup="filterEpisodes()">

      <div class="pagination" id="pagination"></div>

      <div class="episodes-grid" id="episodesGrid">
        <!-- Episodes dynamically load honge -->
      </div>
    </div>

    <div class="back">
      <a href="../index.html">← Back to Home</a>
    </div>
  </main>

  <script>
    const totalEpisodes = 40; // Total episodes
    const episodesPerPage = 20;
    let currentPage = 1;

    function createPagination() {
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';

      const totalPages = Math.ceil(totalEpisodes / episodesPerPage);

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
        btn.textContent = `${(i-1)*episodesPerPage + 1} - ${Math.min(i*episodesPerPage, totalEpisodes)}`;
        btn.onclick = () => {
          currentPage = i;
          renderEpisodes();
          createPagination();
        };
        pagination.appendChild(btn);
      }
    }

    function renderEpisodes() {
      const grid = document.getElementById('episodesGrid');
      grid.innerHTML = '';

      const start = (currentPage - 1) * episodesPerPage + 1;
      const end = Math.min(start + episodesPerPage - 1, totalEpisodes);

      for (let i = start; i <= end; i++) {
        const a = document.createElement('a');
        a.href = `../reader/pyaar-ka-intezar/ch${i}.html`;
        a.className = 'btn';
        a.textContent = `Episode ${i}`;
        grid.appendChild(a);
      }
    }

    function filterEpisodes() {
      const search = document.getElementById('episodeSearch').value.trim();
      const grid = document.getElementById('episodesGrid');
      grid.innerHTML = '';

      if (!search) {
        renderEpisodes();
        return;
      }

      const num = parseInt(search);
      if (isNaN(num) || num < 1 || num > totalEpisodes) {
        grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:40px; color:#aaa;">Koi episode nahi mila</p>';
        return;
      }

      const a = document.createElement('a');
      a.href = `../reader/pyaar-ka-intezar/ch${num}.html`;
      a.className = 'btn';
      a.textContent = `Episode ${num} →`;
      grid.appendChild(a);
    }

    // Initialize
    createPagination();
    renderEpisodes();
  </script>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
  </style>

</body>
</html>
